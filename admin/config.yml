backend:
  name: github
  repo: bertho-web/bookandshop
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
    - name: "config"
    label: "Configuration Site"
    files:
            - label: "Prix & Produits"
        name: "site"
        file: "data/site.json"
        fields:
                    - { label: "Nom du site", name: "site_name", widget: "string" }
                    - label: "Produits"
            name: "products"
            widget: "list"
            fields:
                            - { label: "Nom produit", name: "name", widget: "string" }
                            - { label: "Prix FCFA", name: "price", widget: "number" }
                            - { label: "Image", name: "image", widget: "image" }
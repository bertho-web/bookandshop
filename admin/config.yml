backend:
  name: github
  repo: bertho-web/bookandshop
  branch: main
  base_url: https://solitary-brook-f7b6.bertho.workers.dev
  auth_endpoint: /auth

media_folder: "public/images"
public_folder: "/images"

collections:
    - name: "site_data"
    label: "Prix & Contacts"
    files:
            - name: "site"
        label: "Book and Shop"
        file: "data/site.json"
        fields:
                    - { label: "Email", name: "email", widget: "string" }
                    - { label: "WhatsApp", name: "whatsapp", widget: "string", hint: "Sans + ni espaces, ex: 242068138807" }
                    - { label: "Prix Netflix", name: "netflix_price", widget: "string" }
                    - { label: "Prix Spotify", name: "spotify_price", widget: "string" }
                    - { label: "Prix Prime Video", name: "prime_price", widget: "string" }
                    - { label: "Prix Apple Music", name: "apple_price", widget: "string" }
                    - { label: "Prix Snap+", name: "snap_price", widget: "string" }